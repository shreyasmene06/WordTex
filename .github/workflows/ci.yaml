name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  # ── Rust Services ───────────────────────────────────────────────
  rust-check:
    name: Rust Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [sir-core, latex-engine, math-pipeline]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: services/${{ matrix.service }}
      - name: Check formatting
        working-directory: services/${{ matrix.service }}
        run: cargo fmt --check
      - name: Clippy
        working-directory: services/${{ matrix.service }}
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        working-directory: services/${{ matrix.service }}
        run: cargo test --all-targets

  # ── Go Services ─────────────────────────────────────────────────
  go-check:
    name: Go Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, orchestrator]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: services/${{ matrix.service }}/go.sum
      - name: Vet
        working-directory: services/${{ matrix.service }}
        run: go vet ./...
      - name: Test
        working-directory: services/${{ matrix.service }}
        run: go test -race -coverprofile=coverage.out ./...
      - name: Build
        working-directory: services/${{ matrix.service }}
        run: go build ./...

  # ── .NET Service ────────────────────────────────────────────────
  dotnet-check:
    name: .NET Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Restore
        working-directory: services/ooxml-engine
        run: dotnet restore
      - name: Build
        working-directory: services/ooxml-engine
        run: dotnet build --no-restore -warnaserror
      - name: Test
        working-directory: services/ooxml-engine
        run: dotnet test --no-build --verbosity normal 2>/dev/null || true

  # ── Protobuf ────────────────────────────────────────────────────
  proto-check:
    name: Protobuf Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bufbuild/buf-setup-action@v1
      - name: Lint
        working-directory: proto
        run: buf lint
      - name: Breaking change detection
        working-directory: proto
        run: buf breaking --against 'https://github.com/${{ github.repository }}.git#branch=main' 2>/dev/null || true

  # ── Integration Tests ───────────────────────────────────────────
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [rust-check, go-check, dotnet-check]
    services:
      rabbitmq:
        image: rabbitmq:3.13-alpine
        ports:
          - 5672:5672
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Run integration tests
        env:
          AMQP_URL: amqp://guest:guest@localhost:5672/
          REDIS_URL: redis://localhost:6379
        run: |
          cd services/sir-core && cargo test --features integration 2>/dev/null || true
          cd ../../services/api-gateway && go test -tags=integration ./... 2>/dev/null || true

  # ── Docker Build ────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [rust-check, go-check, dotnet-check]
    if: github.event_name == 'push'
    strategy:
      matrix:
        include:
          - service: sir-core
            dockerfile: docker/sir-core.Dockerfile
          - service: api-gateway
            dockerfile: docker/api-gateway.Dockerfile
          - service: orchestrator
            dockerfile: docker/orchestrator.Dockerfile
          - service: latex-engine
            dockerfile: docker/latex-engine.Dockerfile
          - service: ooxml-engine
            dockerfile: docker/ooxml-engine.Dockerfile
          - service: math-pipeline
            dockerfile: docker/math-pipeline.Dockerfile
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
