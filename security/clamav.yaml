apiVersion: v1
kind: ConfigMap
metadata:
  name: clamav-config
  namespace: wordtex
data:
  clamd.conf: |
    LogSyslog yes
    MaxScanSize 100M
    MaxFileSize 100M
    MaxRecursion 10
    MaxFiles 10000
    AlertEncrypted yes
    AlertEncryptedArchive yes
    ScanPE yes
    ScanELF yes
    ScanOLE2 yes
    ScanPDF yes
    ScanHTML yes
    ScanMail yes
    ScanArchive yes
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: clamav
  namespace: wordtex
spec:
  selector:
    matchLabels:
      app: clamav
  template:
    metadata:
      labels:
        app: clamav
    spec:
      containers:
        - name: clamav
          image: clamav/clamav:1.3
          ports:
            - containerPort: 3310
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 2Gi
          volumeMounts:
            - name: config
              mountPath: /etc/clamav/clamd.conf
              subPath: clamd.conf
      volumes:
        - name: config
          configMap:
            name: clamav-config
---
apiVersion: v1
kind: Service
metadata:
  name: clamav
  namespace: wordtex
spec:
  selector:
    app: clamav
  ports:
    - port: 3310
      targetPort: 3310
