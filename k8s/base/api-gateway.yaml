apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: wordtex
  labels:
    app: api-gateway
    app.kubernetes.io/part-of: wordtex
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: wordtex/api-gateway:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PORT
              value: "8080"
            - name: ENVIRONMENT
              value: production
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: wordtex-secrets
                  key: jwt-secret
            - name: AMQP_URL
              valueFrom:
                secretKeyRef:
                  name: wordtex-secrets
                  key: amqp-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: wordtex-secrets
                  key: redis-url
            - name: RATE_LIMIT_RPS
              value: "50"
            - name: MAX_UPLOAD_MB
              value: "100"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: wordtex
spec:
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 8080
      name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api-gateway
  namespace: wordtex
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api-gateway
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
