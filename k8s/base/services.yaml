apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: wordtex
  labels:
    app: orchestrator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
    spec:
      containers:
        - name: orchestrator
          image: wordtex/orchestrator:latest
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: wordtex-secrets
                  key: redis-url
            - name: AMQP_URL
              valueFrom:
                secretKeyRef:
                  name: wordtex-secrets
                  key: amqp-url
            - name: SIR_CORE_GRPC_ADDR
              value: sir-core:50051
            - name: LATEX_ENGINE_ADDR
              value: latex-engine:50052
            - name: OOXML_ENGINE_ADDR
              value: ooxml-engine:50054
            - name: WORKER_CONCURRENCY
              value: "8"
            - name: JOB_TIMEOUT_SECS
              value: "300"
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator
  namespace: wordtex
spec:
  selector:
    app: orchestrator
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: latex-engine
  namespace: wordtex
  labels:
    app: latex-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: latex-engine
  template:
    metadata:
      labels:
        app: latex-engine
    spec:
      # Use gVisor runtime for sandbox isolation
      runtimeClassName: gvisor
      containers:
        - name: latex-engine
          image: wordtex/latex-engine:latest
          ports:
            - containerPort: 50052
              name: grpc
          env:
            - name: GRPC_PORT
              value: "50052"
            - name: SANDBOX_ENABLED
              value: "true"
            - name: MAX_COMPILE_TIME_SECS
              value: "120"
            - name: MAX_MEMORY_MB
              value: "2048"
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 4Gi
          volumeMounts:
            - name: latex-cache
              mountPath: /tmp/wordtex-latex-cache
      volumes:
        - name: latex-cache
          emptyDir:
            sizeLimit: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: latex-engine
  namespace: wordtex
spec:
  selector:
    app: latex-engine
  ports:
    - port: 50052
      targetPort: 50052
      name: grpc
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ooxml-engine
  namespace: wordtex
  labels:
    app: ooxml-engine
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ooxml-engine
  template:
    metadata:
      labels:
        app: ooxml-engine
    spec:
      containers:
        - name: ooxml-engine
          image: wordtex/ooxml-engine:latest
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: ASPNETCORE_URLS
              value: http://+:8080
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: ooxml-engine
  namespace: wordtex
spec:
  selector:
    app: ooxml-engine
  ports:
    - port: 50054
      targetPort: 8080
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: math-pipeline
  namespace: wordtex
  labels:
    app: math-pipeline
spec:
  replicas: 2
  selector:
    matchLabels:
      app: math-pipeline
  template:
    metadata:
      labels:
        app: math-pipeline
    spec:
      containers:
        - name: math-pipeline
          image: wordtex/math-pipeline:latest
          ports:
            - containerPort: 50053
              name: grpc
          env:
            - name: GRPC_PORT
              value: "50053"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: math-pipeline
  namespace: wordtex
spec:
  selector:
    app: math-pipeline
  ports:
    - port: 50053
      targetPort: 50053
      name: grpc
  type: ClusterIP
