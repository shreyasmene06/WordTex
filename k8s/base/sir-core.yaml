apiVersion: apps/v1
kind: Deployment
metadata:
  name: sir-core
  namespace: wordtex
  labels:
    app: sir-core
    app.kubernetes.io/part-of: wordtex
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sir-core
  template:
    metadata:
      labels:
        app: sir-core
    spec:
      containers:
        - name: sir-core
          image: wordtex/sir-core:latest
          ports:
            - containerPort: 50051
              name: grpc
            - containerPort: 8081
              name: http
          env:
            - name: HTTP_PORT
              value: "8081"
            - name: GRPC_PORT
              value: "50051"
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: wordtex-secrets
                  key: redis-url
            - name: AMQP_URL
              valueFrom:
                secretKeyRef:
                  name: wordtex-secrets
                  key: amqp-url
            - name: WORKER_CONCURRENCY
              value: "8"
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ready
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: sir-core
  namespace: wordtex
spec:
  selector:
    app: sir-core
  ports:
    - port: 50051
      targetPort: 50051
      name: grpc
    - port: 8081
      targetPort: 8081
      name: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: sir-core
  namespace: wordtex
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: sir-core
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Pods
      pods:
        metric:
          name: rabbitmq_queue_messages
        target:
          type: AverageValue
          averageValue: "30"
